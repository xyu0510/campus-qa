<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>厦门工学院 - 校园办事问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #f8fffe 0%, #f0fff4 50%, #e8f5e9 100%);
            min-height: 100vh;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .petal {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(7, 193, 96, 0.15);
            border-radius: 50% 0 50% 0;
            animation: float 15s infinite ease-in-out;
        }

        .petal:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .petal:nth-child(2) { top: 20%; left: 80%; animation-delay: 2s; width: 15px; height: 15px; }
        .petal:nth-child(3) { top: 40%; left: 15%; animation-delay: 4s; width: 25px; height: 25px; }
        .petal:nth-child(4) { top: 60%; left: 85%; animation-delay: 6s; }
        .petal:nth-child(5) { top: 80%; left: 25%; animation-delay: 8s; width: 18px; height: 18px; }
        .petal:nth-child(6) { top: 30%; left: 70%; animation-delay: 10s; width: 22px; height: 22px; }
        .petal:nth-child(7) { top: 70%; left: 60%; animation-delay: 12s; }
        .petal:nth-child(8) { top: 15%; left: 50%; animation-delay: 3s; width: 16px; height: 16px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.3; }
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(7, 193, 96, 0.4);
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(7, 193, 96, 0.6);
        }

        .school-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: url('images/知厦.jpg') center/cover no-repeat;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(7, 193, 96, 0.4);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text .cn {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text .en {
            font-size: 10px;
            color: #999;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .nav-item {
            font-size: 15px;
            color: #666;
            text-decoration: none;
            padding: 10px 0;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item:hover {
            color: #07C160;
        }

        .nav-item.active {
            color: #07C160;
            font-weight: 700;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #07C160, #06AD56);
            border-radius: 3px;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 110px 50px 60px;
            position: relative;
            z-index: 1;
        }

        /* 问答区域 */
        .qa-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .qa-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .qa-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .qa-subtitle {
            font-size: 16px;
            color: #888;
        }

        /* 搜索框 */
        .search-box {
            max-width: 800px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            border-color: #07C160;
            box-shadow: 0 0 0 4px rgba(7, 193, 96, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px rgba(7, 193, 96, 0.4);
        }

        /* 热门问题 */
        .hot-questions {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .question-tag {
            padding: 12px 24px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .question-tag:hover {
            background: linear-gradient(135deg, #07C160 0%, #06AD56 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(7, 193, 96, 0.3);
        }

        /* 答案展示区 */
        .answer-area {
            min-height: 300px;
            background: #f8f9ff;
            border-radius: 20px;
            padding: 30px;
            border: 2px dashed #e0e0e0;
        }

        .answer-placeholder {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .answer-placeholder-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .answer-placeholder-text {
            font-size: 16px;
            line-height: 1.6;
        }

        .answer-content {
            display: none;
        }

        .answer-content.show {
            display: block;
        }

        .answer-content h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #07C160;
        }

        .answer-content p {
            font-size: 15px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .answer-content ul {
            list-style: none;
            padding-left: 0;
        }

        .answer-content li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .answer-content li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #07C160;
            font-weight: bold;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
            font-weight: 500;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
                height: 65px;
            }

            .nav-menu {
                display: none;
            }

            .container {
                padding: 90px 20px 40px;
            }

            .qa-section {
                padding: 30px 20px;
            }

            .qa-title {
                font-size: 28px;
            }

            .search-input {
                padding: 15px 55px 15px 20px;
                font-size: 14px;
            }

            .question-tag {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
    </div>

    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="goBack()">
                <span>←</span>
                <span>返回</span>
            </button>
            <div class="school-logo">
                <div class="logo-icon"></div>
                <div class="logo-text">
                    <div class="cn">厦门工学院</div>
                    <div class="en">XIAMEN INSTITUTE OF TECHNOLOGY</div>
                </div>

        </div>
        <div class="nav-menu">
            <div class="nav-item active">智能问答</div>
            <div class="nav-item" onclick="window.open('https://www.xit.edu.cn/', '_blank')">学校概况</div>

        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 问答区域 -->
        <div class="qa-section">
            <div class="qa-header">
                <h1 class="qa-title">🤖 校园办事智能问答</h1>
                <p class="qa-subtitle">输入您的问题，获取准确的办事指南和政策解答</p>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" class="search-input" id="questionInput" placeholder="请输入您的问题，例如：奖学金申请流程、违纪处分解除办法..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchQuestion()">🔍</button>
            </div>

            <!-- 热门问题 -->
            <div class="hot-questions">
                <div class="section-title">
                    <span>🔥</span>
                    <span>热门问题</span>
                </div>
                <div class="question-tags">
                    <div class="question-tag" onclick="quickSearch('奖学金申请条件')">奖学金申请条件</div>
                    <div class="question-tag" onclick="quickSearch('违纪处分解除')">违纪处分解除</div>
                    <div class="question-tag" onclick="quickSearch('勤工助学申请')">勤工助学申请</div>
                    <div class="question-tag" onclick="quickSearch('国家助学金')">国家助学金</div>
                    <div class="question-tag" onclick="quickSearch('宿舍管理规定')">宿舍管理规定</div>
                    <div class="question-tag" onclick="quickSearch('证件补办流程')">证件补办流程</div>
                </div>
            </div>

            <!-- 答案展示区 -->
            <div class="answer-area">
                <div class="answer-placeholder" id="placeholder">
                    <div class="answer-placeholder-icon">💬</div>
                    <div class="answer-placeholder-text">
                        <p>在上方输入您的问题，或点击热门问题标签</p>
                        <p style="margin-top: 10px; font-size: 14px; color: #aaa;">支持查询：奖学金、助学金、违纪处分、勤工助学、宿舍管理等</p>
                    </div>
                </div>
                <div class="answer-content" id="answerContent">
                    <!-- 答案将在这里显示 -->
                </div>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer">
            <p>厦门工学院 © 2026 | 校园办事问答系统</p>
        </div>
    </div>

    <script>
        // 知识库数据
        const knowledgeBase = {
            '奖学金': `
                <h3>🎓 奖学金申请指南</h3>

                <ul>
                    <li>全日制在校本科学生</li>

                <p>1. 向所在学院提交申请<br>2. 学院审核并公示<br>3. 学生处审批<br>4. 发文解除处分</p>
            `,
            '勤工助学': `

            '助学金': `

                <ul>

                <p><strong>申请条件：</strong></p>

        // 返回上一页
        function goBack() {
            window.location.href = 'index.html';
        }

        // 快速搜索
        function quickSearch(question) {
            document.getElementById('questionInput').value = question;
            searchQuestion();

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchQuestion();
            }
        }

        // 搜索问题（调用通义千问API）
        async function searchQuestion() {
            const question = document.getElementById('questionInput').value.trim();
            
            if (!question) {
                alert('请输入您的问题');
                return;
            }

            const answerContent = document.getElementById('answerContent');
            const placeholder = document.getElementById('placeholder');
            
            placeholder.style.display = 'none';
            answerContent.classList.add('show');
            answerContent.innerHTML = '<div style="text-align: center; padding: 40px;"><p style="font-size: 18px; color: #07C160;">🤖 AI正在思考中...</p></div>';

            try {
                const response = await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sk-ws-H.RYDRMRM.ojrr.MEQCIHM6JQ0cXQBq1gaQtqdcw1ih-QIuaa4HbgtiWQQONAgcAiAntgOdURl-MYVyMzrBFbwRj4CH4_p9o9Vk_W4JdfTUQg',
                    },
                    body: JSON.stringify({
                        model: 'qwen-turbo',
                        input: {
                            messages: [
                                { role: 'system', content: '你是厦门工学院的智能问答助手，专门解答校园办事相关问题。知识库：1.奖学金申请-条件：全日制在校本科生、成绩优异无挂科、综合素质排名靠前、无违纪；材料：申请表、成绩单、综测表；流程：提交材料→学院初审→学校复审→公示。2.违纪处分解除-条件：处分期满（警告6月、严重警告9月、记过12月、留校察看18月）、表现良好；材料：申请书、思想汇报、辅导员意见；流程：提交申请→学院审核→学生处审批→解除。3.勤工助学-条件：家庭困难、学有余力；岗位：校内固定/临时、校外；报酬：不低于厦门市最低工资。4.国家助学金-标准：特别困难4000元/年、比较困难3000元/年、一般困难2000元/年；条件：家庭困难、通过认定。5.宿舍管理-作息：开门6:00、关门23:00、熄灯23:30；规定：禁大功率电器、禁留外人、保持卫生。6.证件补办-学生证：申请表+照片+10元→学生处；校园卡：身份证+20元→卡中心。请用友好语气回答，适当使用emoji。' },
                                { role: 'user', content: question }
                            ]
                        }
                    })
                });

                const data = await response.json();
                
                if (data.output && data.output.text) {
                    answerContent.innerHTML = '<h3>📋 智能回答</h3><div style="font-size: 15px; color: #555; line-height: 1.8; white-space: pre-wrap;">' + data.output.text + '</div><div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #e8f5e9; font-size: 12px; color: #999;">💡 此回答由AI生成，仅供参考，具体以学校官方规定为准</div>';
                } else {
                    throw new Error('未获取到有效回答');
                }
            } catch (error) {
                console.error('查询失败:', error);
                answerContent.innerHTML = '<div style="text-align: center; padding: 40px;"><p style="font-size: 40px; margin-bottom: 20px;">⚠️</p><p style="font-size: 16px; color: #999;">查询出错：' + error.message + '</p><p style="font-size: 14px; color: #aaa; margin-top: 10px;">请检查网络连接或稍后重试</p></div>';
            }
        }

    </script>
</body>
</html>

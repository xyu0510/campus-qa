<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>厦门工学院 - 校园办事问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle:nth-child(1) { width: 300px; height: 300px; top: -100px; left: -100px; animation-delay: 0s; }
        .circle:nth-child(2) { width: 200px; height: 200px; top: 50%; right: -50px; animation-delay: 5s; }
        .circle:nth-child(3) { width: 250px; height: 250px; bottom: -100px; left: 30%; animation-delay: 10s; }
        .circle:nth-child(4) { width: 180px; height: 180px; top: 20%; left: 60%; animation-delay: 15s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        /* 顶部导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .school-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #D32F2F 0%, #C62828 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text .cn {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
        }

        .logo-text .en {
            font-size: 10px;
            color: #999;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .nav-item {
            font-size: 15px;
            color: #666;
            text-decoration: none;
            padding: 10px 0;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item:hover {
            color: #667eea;
        }

        .nav-item.active {
            color: #667eea;
            font-weight: 700;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 110px 50px 60px;
            position: relative;
            z-index: 1;
        }

        /* 问答区域 */
        .qa-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .qa-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .qa-title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .qa-subtitle {
            font-size: 16px;
            color: #888;
        }

        /* 搜索框 */
        .search-box {
            max-width: 800px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 热门问题 */
        .hot-questions {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .question-tag {
            padding: 12px 24px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .question-tag:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        /* 答案展示区 */
        .answer-area {
            min-height: 300px;
            background: #f8f9ff;
            border-radius: 20px;
            padding: 30px;
            border: 2px dashed #e0e0e0;
        }

        .answer-placeholder {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .answer-placeholder-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .answer-placeholder-text {
            font-size: 16px;
            line-height: 1.6;
        }

        .answer-content {
            display: none;
        }

        .answer-content.show {
            display: block;
        }

        .answer-content h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .answer-content p {
            font-size: 15px;
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .answer-content ul {
            list-style: none;
            padding-left: 0;
        }

        .answer-content li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .answer-content li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 500;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
                height: 65px;
            }

            .nav-menu {
                display: none;
            }

            .container {
                padding: 90px 20px 40px;
            }

            .qa-section {
                padding: 30px 20px;
            }

            .qa-title {
                font-size: 28px;
            }

            .search-input {
                padding: 15px 55px 15px 20px;
                font-size: 14px;
            }

            .question-tag {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="goBack()">
                <span>←</span>
                <span>返回</span>
            </button>
            <div class="school-logo">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">
                    <div class="cn">厦门工学院</div>
                    <div class="en">XIAMEN INSTITUTE OF TECHNOLOGY</div>
                </div>
            </div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active">智能问答</div>
            <div class="nav-item" onclick="window.open('https://www.xit.edu.cn/', '_blank')">学校概况</div>
            <div class="nav-item" onclick="window.open('https://www.xit.edu.cn/zsw/zyjs/list.htm', '_blank')">常用链接</div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 问答区域 -->
        <div class="qa-section">
            <div class="qa-header">
                <h1 class="qa-title">🤖 校园办事智能问答</h1>
                <p class="qa-subtitle">输入您的问题，获取准确的办事指南和政策解答</p>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <input type="text" class="search-input" id="questionInput" placeholder="请输入您的问题，例如：奖学金申请流程、违纪处分解除办法..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="searchQuestion()">�</button>
            </div>

            <!-- 热门问题 -->
            <div class="hot-questions">
                <div class="section-title">
                    <span>🔥</span>
                    <span>热门问题</span>
                </div>
                <div class="question-tags">
                    <div class="question-tag" onclick="quickSearch('奖学金申请条件')">奖学金申请条件</div>
                    <div class="question-tag" onclick="quickSearch('违纪处分解除')">违纪处分解除</div>
                    <div class="question-tag" onclick="quickSearch('勤工助学申请')">勤工助学申请</div>
                    <div class="question-tag" onclick="quickSearch('国家助学金')">国家助学金</div>
                    <div class="question-tag" onclick="quickSearch('宿舍管理规定')">宿舍管理规定</div>
                    <div class="question-tag" onclick="quickSearch('证件补办流程')">证件补办流程</div>
                </div>
            </div>

            <!-- 答案展示区 -->
            <div class="answer-area">
                <div class="answer-placeholder" id="placeholder">
                    <div class="answer-placeholder-icon">�</div>
                    <div class="answer-placeholder-text">
                        <p>在上方输入您的问题，或点击热门问题标签</p>
                        <p style="margin-top: 10px; font-size: 14px; color: #aaa;">支持查询：奖学金、助学金、违纪处分、勤工助学、宿舍管理等</p>
                    </div>
                </div>
                <div class="answer-content" id="answerContent">
                    <!-- 答案将在这里显示 -->
                </div>
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer">
            <p>厦门工学院 © 2024 | 校园办事问答系统</p>
        </div>
    </div>

    <script>
        // 返回上一页
        function goBack() {
            window.location.href = 'index.html';
        }

        // 快速搜索
        function quickSearch(question) {
            document.getElementById('questionInput').value = question;
            searchQuestion();
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchQuestion();
            }
        }

        // 搜索问题
        async function searchQuestion() {
            const question = document.getElementById('questionInput').value.trim();
            
            if (!question) {
                alert('请输入您的问题');
                return;
            }

            // 显示加载状态
            const answerContent = document.getElementById('answerContent');
            const placeholder = document.getElementById('placeholder');
            
            placeholder.style.display = 'none';
            answerContent.classList.add('show');
            answerContent.innerHTML = '<div style="text-align: center; padding: 40px;"><p style="font-size: 18px; color: #667eea;">🔍 正在查询中...</p></div>';

            try {
                // 调用知识库搜索
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        knowledgeBase: '厦工政策'
                    })
                });

                const data = await response.json();
                
                if (data.answer) {
                    displayAnswer(data.answer);
                } else {
                    displayNoAnswer();
                }
            } catch (error) {
                console.error('查询失败:', error);
                displayError();
            }
        }

        // 显示答案
        function displayAnswer(answer) {
            const answerContent = document.getElementById('answerContent');
            answerContent.innerHTML = `
                <h3>📋 答案</h3>
                <div style="font-size: 15px; color: #555; line-height: 1.8;">
                    ${answer}
                </div>
            `;
        }

        // 显示无答案
        function displayNoAnswer() {
            const answerContent = document.getElementById('answerContent');
            answerContent.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p style="font-size: 40px; margin-bottom: 20px;">😕</p>
                    <p style="font-size: 16px; color: #999;">抱歉，未找到相关答案</p>
                    <p style="font-size: 14px; color: #aaa; margin-top: 10px;">请尝试换一种提问方式，或联系学校相关部门咨询</p>
                </div>
            `;
        }

        // 显示错误
        function displayError() {
            const answerContent = document.getElementById('answerContent');
            answerContent.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <p style="font-size: 40px; margin-bottom: 20px;">⚠️</p>
                    <p style="font-size: 16px; color: #999;">查询出错，请稍后重试</p>
                </div>
            `;
        }
    </script>
</body>
</html>
